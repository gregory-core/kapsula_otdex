<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Атмосферный плеер — Персональная медитация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #0a0f1a;
            color: white;
        }

        #livingCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .user-bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .user-bg-layer.active {
            opacity: 1;
        }

        .glass-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.5) 100%);
            backdrop-filter: blur(3px);
            z-index: 1;
            pointer-events: none;
        }

        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 20px;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            min-height: 100vh;
            justify-content: center;
        }

        .title-block {
            text-align: center;
            backdrop-filter: blur(16px);
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 48px;
            padding: 12px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .title-block h1 {
            font-size: clamp(1.4rem, 3vw, 2.2rem);
            font-weight: 600;
        }

        .title-block .subtitle {
            font-size: 0.75rem;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 620px;
        }

        @media (max-width: 600px) {
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 380px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .card {
            position: relative;
            aspect-ratio: 1 / 1.15;
            border-radius: 24px;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            background: rgba(20, 20, 30, 0.5);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            text-shadow: 0 1px 6px black;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .card.active {
            border-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.4), 0 18px 40px black;
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .card .icon {
            font-size: 2.2rem;
            filter: drop-shadow(0 2px 6px black);
        }

        .card .label {
            font-size: 0.75rem;
            text-align: center;
        }

        .custom-section {
            backdrop-filter: blur(20px);
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            padding: 18px 20px;
            width: 100%;
            margin-top: 6px;
        }

        .custom-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 0.3px;
        }

        .upload-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: space-between;
        }

        .upload-item {
            flex: 1;
            min-width: 140px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 12px 12px;
            text-align: center;
            transition: 0.2s;
            border: 1px dashed rgba(255, 255, 255, 0.3);
        }

        .upload-item label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .upload-item input {
            display: none;
        }

        .preview-area {
            font-size: 0.7rem;
            margin-top: 10px;
            word-break: break-all;
            color: #ccc;
        }

        .custom-badge {
            background: #5a4b8c;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .reset-custom-btn {
            background: rgba(255, 80, 80, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.5);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            width: fit-content;
        }

        .reset-custom-btn:hover {
            background: rgba(255, 80, 80, 0.5);
        }

        .sound-control {
            backdrop-filter: blur(20px);
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .sound-control .btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 40px;
            padding: 6px 16px;
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .sound-control .btn:hover {
            background: rgba(255, 255, 255, 0.28);
            transform: scale(0.97);
        }

        .volume-slider {
            width: 100px;
            height: 5px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }

        .now-playing {
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            padding: 5px 18px;
            border-radius: 40px;
        }

        @media (max-width: 540px) {
            .upload-zone {
                flex-direction: column;
                gap: 12px;
            }

            .sound-control {
                gap: 12px;
            }
        }
    </style>
</head>

<body>

    <canvas id="livingCanvas"></canvas>
    <div id="userBgLayer" class="user-bg-layer"></div>
    <div class="glass-overlay"></div>

    <div class="main-container">
        <div class="title-block">
            <h1>🧘 Атмосферный плеер</h1>
            <p class="subtitle">релакс • эмбиент • твой мир</p>
        </div>

        <div class="cards-grid" id="cardsGrid"></div>

        <div class="custom-section" id="customSection">
            <div class="custom-title">
                <span>🎨 ТВОЁ ПРОСТРАНСТВО</span>
                <span class="custom-badge" id="customModeBadge">🌙 стандартный режим</span>
            </div>
            <div class="upload-zone">
                <div class="upload-item">
                    <label>
                        🎵 Загрузить музыку
                        <input type="file" id="uploadMusic" accept="audio/mpeg,audio/wav,audio/ogg,audio/mp3">
                    </label>
                    <div class="preview-area" id="musicPreview">Файл не выбран</div>
                </div>
                <div class="upload-item">
                    <label>
                        🖼️ Загрузить фон
                        <input type="file" id="uploadBg" accept="image/jpeg,image/png,image/webp">
                    </label>
                    <div class="preview-area" id="bgPreview">Фон не выбран</div>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
                <div style="font-size: 0.7rem; opacity: 0.7;">✨ Загрузите музыку — появится карточка «Моё»</div>
                <div class="reset-custom-btn" id="resetCustomBtn">✖️ Вернуться к темам</div>
            </div>
        </div>

        <div class="now-playing" id="nowPlaying">✨ выбери настроение</div>

        <div class="sound-control">
            <button class="btn" id="playPauseBtn"><span id="playIcon">▶</span> <span
                    id="playLabel">Играть</span></button>
            <button class="btn mute-btn" id="muteBtn">🔊</button>
            <span style="font-size:0.75rem;">🎚️</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="45">
        </div>
    </div>

    <script>
        (function () {
            // ------ СТАНДАРТНЫЕ ТЕМЫ ------
            const themes = [
                { id: 'forest', name: 'Лес', icon: '🌲', description: 'золотистый свет, сочная зелень', visualType: 'forest' },
                { id: 'ocean', name: 'Океан', icon: '🌊', description: 'бирюзовые волны, лунные блики', visualType: 'ocean' },
                { id: 'space', name: 'Космос', icon: '🌌', description: 'цветные туманности, яркие звёзды', visualType: 'space' },
                { id: 'rain', name: 'Дождь', icon: '🌧️', description: 'грозовое небо, вспышки молний', visualType: 'rain' },
                { id: 'city', name: 'Город', icon: '🏙️', description: 'неоновый мегаполис, огни', visualType: 'city' }
            ];

            let audioContext = null;
            let masterGain = null;
            let isPlaying = false;
            let isMuted = false;
            let volume = 0.45;
            let currentThemeId = 'forest';
            let activeSoundNodes = [];
            let stopSoundFunctions = [];

            let isCustomMode = false;
            let customAudioElement = null;
            let customMediaSource = null;
            let customAudioUrl = null;
            let customBgImageUrl = null;

            const cardsGrid = document.getElementById('cardsGrid');
            const nowPlayingDiv = document.getElementById('nowPlaying');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const playIcon = document.getElementById('playIcon');
            const playLabel = document.getElementById('playLabel');
            const muteBtn = document.getElementById('muteBtn');
            const volumeSlider = document.getElementById('volumeSlider');
            const resetCustomBtn = document.getElementById('resetCustomBtn');
            const uploadMusic = document.getElementById('uploadMusic');
            const uploadBg = document.getElementById('uploadBg');
            const musicPreview = document.getElementById('musicPreview');
            const bgPreview = document.getElementById('bgPreview');
            const customModeBadge = document.getElementById('customModeBadge');
            const userBgLayer = document.getElementById('userBgLayer');

            const canvas = document.getElementById('livingCanvas');
            let ctx = canvas.getContext('2d');
            let time = 0;
            let currentVisual = 'forest';
            let animFrameId = null;
            let canvasActive = true;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ---------- НАСЫЩЕННЫЕ ЖИВЫЕ ФОНЫ ----------
            function drawForest(t) {
                const w = canvas.width, h = canvas.height;
                // Яркий градиент: глубокий зелёный -> изумрудный -> золотистый
                const grad = ctx.createLinearGradient(0, 0, 0, h);
                grad.addColorStop(0, '#0a2e1a');
                grad.addColorStop(0.4, '#1f6b3a');
                grad.addColorStop(0.7, '#3aa55e');
                grad.addColorStop(1, '#7cb342');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);

                // Солнечные лучи сверху
                ctx.save();
                ctx.globalAlpha = 0.12 + Math.sin(t * 0.3) * 0.04;
                for (let i = 0; i < 5; i++) {
                    const angle = -0.4 + i * 0.2 + Math.sin(t * 0.2 + i) * 0.1;
                    const x1 = w * 0.4 + i * 60;
                    const x2 = x1 + Math.tan(angle) * h;
                    ctx.beginPath();
                    ctx.moveTo(x1, 0);
                    ctx.lineTo(x2, h);
                    ctx.lineTo(x2 + 40, h);
                    ctx.lineTo(x1 + 20, 0);
                    ctx.fillStyle = '#ffd54f';
                    ctx.fill();
                }
                ctx.restore();

                // Светлячки и частицы
                for (let i = 0; i < 55; i++) {
                    let x = (Math.sin(t * 0.15 + i) * 0.5 + 0.5) * w;
                    let y = (Math.cos(t * 0.12 + i * 1.1) * 0.4 + 0.5) * h;
                    let r = 2.5 + Math.sin(t * 2 + i) * 1.4;
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    let alpha = 0.4 + Math.sin(t * 1.8 + i) * 0.15;
                    ctx.fillStyle = `rgba(255, 235, 150, ${alpha})`;
                    ctx.fill();
                    // яркие блики
                    ctx.beginPath();
                    ctx.arc(x - 0.5, y - 0.5, r * 0.6, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 200, ${alpha * 0.8})`;
                    ctx.fill();
                }
            }

            function drawOcean(t) {
                const w = canvas.width, h = canvas.height;
                // Бирюзово-синий градиент
                const grad = ctx.createLinearGradient(0, 0, 0, h);
                grad.addColorStop(0, '#023b5a');
                grad.addColorStop(0.5, '#0077b6');
                grad.addColorStop(1, '#00b4d8');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);

                // Волны с пеной
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    let yOff = h * 0.55 + Math.sin(t * 0.5 + i) * 8;
                    ctx.moveTo(0, yOff);
                    for (let x = 0; x <= w; x += 20) {
                        let y = yOff + Math.sin(x * 0.008 + t * 0.7 + i) * 12;
                        ctx.lineTo(x, y);
                    }
                    ctx.strokeStyle = `rgba(180, 230, 255, ${0.5 + Math.sin(t + i) * 0.1})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    // пена
                    ctx.strokeStyle = `rgba(255, 255, 255, 0.4)`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                // Лунные блики на воде
                ctx.save();
                ctx.globalAlpha = 0.25 + Math.sin(t * 0.7) * 0.08;
                for (let i = 0; i < 12; i++) {
                    let x = w * 0.7 + Math.sin(t * 0.4 + i) * 50;
                    let y = h * 0.35 + i * 18;
                    ctx.beginPath();
                    ctx.ellipse(x, y, 30 + Math.sin(t + i) * 8, 4, 0.1, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffcc';
                    ctx.fill();
                }
                ctx.restore();

                // Искры на гребнях
                for (let i = 0; i < 40; i++) {
                    let x = (Math.sin(t * 0.5 + i) + 1) * w * 0.5;
                    let y = h * 0.45 + Math.sin(t * 0.7 + i) * h * 0.15;
                    ctx.beginPath();
                    ctx.arc(x, y, 1.5 + Math.sin(t * 3 + i) * 1.5, 0, 2 * Math.PI);
                    ctx.fillStyle = `rgba(255, 255, 200, ${0.6 + Math.sin(t * 2 + i) * 0.2})`;
                    ctx.fill();
                }
            }

            function drawSpace(t) {
                const w = canvas.width, h = canvas.height;
                // Глубокий космический фон
                const grad = ctx.createRadialGradient(w * 0.4, h * 0.5, 0, w * 0.8, h * 0.8, w);
                grad.addColorStop(0, '#2a0a5e');
                grad.addColorStop(0.5, '#140626');
                grad.addColorStop(1, '#020010');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);

                // Цветные туманности
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                const nebulae = [
                    { x: w * 0.3, y: h * 0.4, r: 150, color: 'rgba(180, 70, 200, 0.08)' },
                    { x: w * 0.7, y: h * 0.6, r: 180, color: 'rgba(70, 150, 230, 0.1)' },
                    { x: w * 0.5, y: h * 0.3, r: 120, color: 'rgba(230, 120, 70, 0.06)' }
                ];
                nebulae.forEach(n => {
                    const radGrad = ctx.createRadialGradient(n.x, n.y, n.r * 0.2, n.x, n.y, n.r);
                    radGrad.addColorStop(0, n.color);
                    radGrad.addColorStop(1, 'transparent');
                    ctx.fillStyle = radGrad;
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.restore();

                // Множество ярких звёзд разных цветов
                for (let i = 0; i < 200; i++) {
                    let x = (Math.sin(t * 0.02 + i * 0.7) * 0.8 + 0.5) * w;
                    let y = (Math.cos(t * 0.03 + i * 0.5) * 0.8 + 0.5) * h;
                    let rad = 1.2 + Math.sin(t * 1.5 + i) * 0.9;
                    let hue = (i * 37 + Math.floor(t * 10)) % 360;
                    let sat = 50 + Math.sin(i) * 30;
                    let light = 70 + Math.sin(i * 2) * 20;
                    ctx.beginPath();
                    ctx.arc(x, y, rad, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, 0.9)`;
                    ctx.fill();
                }

                // Мерцающие крупные звёзды
                for (let i = 0; i < 8; i++) {
                    let x = w * (0.2 + i * 0.08);
                    let y = h * (0.3 + Math.sin(i) * 0.4);
                    ctx.beginPath();
                    ctx.arc(x, y, 2.5 + Math.sin(t * 5 + i) * 1.5, 0, 2 * Math.PI);
                    ctx.fillStyle = '#fffbe6';
                    ctx.fill();
                }
            }

            function drawRain(t) {
                const w = canvas.width, h = canvas.height;
                // Грозовое небо: тёмно-синий -> фиолетовый
                const grad = ctx.createLinearGradient(0, 0, 0, h);
                grad.addColorStop(0, '#110b29');
                grad.addColorStop(0.5, '#1c1c4a');
                grad.addColorStop(1, '#2d3a6e');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);

                // Вспышки молний
                let flashAlpha = 0;
                const lightningPhase = (t * 0.7) % (Math.PI * 2);
                if (Math.sin(lightningPhase) > 0.92) {
                    flashAlpha = 0.25 * (Math.sin(lightningPhase) - 0.92) * 12;
                }
                if (flashAlpha > 0) {
                    ctx.fillStyle = `rgba(200, 210, 255, ${flashAlpha})`;
                    ctx.fillRect(0, 0, w, h);
                    // Рисуем ветви молнии
                    ctx.strokeStyle = `rgba(255, 255, 200, ${flashAlpha * 2})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    let lx = w * 0.3, ly = 0;
                    ctx.moveTo(lx, ly);
                    for (let i = 0; i < 5; i++) {
                        lx += (Math.random() - 0.5) * 60;
                        ly += h * 0.15;
                        ctx.lineTo(lx, ly);
                    }
                    ctx.stroke();
                }

                // Дождевые капли (яркие, подсвеченные)
                for (let i = 0; i < 150; i++) {
                    let x = (i * 97) % w;
                    let y = ((t * 70 + i * 43) % (h + 60)) - 30;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x - 1.8, y + 12);
                    ctx.lineTo(x + 1.8, y + 12);
                    ctx.fillStyle = `rgba(180, 210, 255, 0.45)`;
                    ctx.fill();
                }
            }

            function drawCity(t) {
                const w = canvas.width, h = canvas.height;
                // Ночной неоновый город
                const grad = ctx.createLinearGradient(0, 0, 0, h);
                grad.addColorStop(0, '#0f0c1f');
                grad.addColorStop(0.6, '#231b3a');
                grad.addColorStop(1, '#3a2e5c');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);

                // Здания с неоновыми окнами
                const buildingColors = ['#ff4d6d', '#f72585', '#b5179e', '#7209b7', '#4895ef', '#4cc9f0', '#f9c74f'];
                for (let i = 0; i < 16; i++) {
                    let x = (i * 85 + 20) % (w + 40) - 20;
                    let height = 120 + Math.sin(t * 0.2 + i) * 30;
                    let width = 30 + Math.sin(i) * 10;
                    // тень здания
                    ctx.fillStyle = '#0d0b1a';
                    ctx.fillRect(x, h - height, width, height);
                    // неоновая обводка
                    ctx.strokeStyle = buildingColors[i % buildingColors.length];
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(x, h - height, width, height);
                    // окна
                    for (let wy = 0; wy < 7; wy++) {
                        for (let wx = 0; wx < 2; wx++) {
                            let wxPos = x + 6 + wx * 11;
                            let wyPos = h - height + 12 + wy * 16;
                            let alpha = 0.5 + Math.sin(t * 3 + wx * wy) * 0.3;
                            ctx.fillStyle = `rgba(255, 230, 150, ${alpha})`;
                            ctx.fillRect(wxPos, wyPos, 6, 8);
                            // отражение
                            ctx.fillStyle = `rgba(255, 100, 180, ${alpha * 0.5})`;
                            ctx.fillRect(wxPos + 1, wyPos + 1, 3, 4);
                        }
                    }
                    // неоновая вывеска на крыше
                    ctx.fillStyle = buildingColors[(i + 2) % buildingColors.length];
                    ctx.font = 'bold 10px sans-serif';
                    ctx.fillText('◈', x + 8, h - height - 4);
                }

                // Машины с яркими фарами
                for (let i = 0; i < 28; i++) {
                    let carX = (t * 45 + i * 160) % (w + 280) - 140;
                    let carY = h * 0.75 + Math.sin(i) * 15;
                    ctx.beginPath();
                    ctx.arc(carX, carY, 2.2, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffaa33';
                    ctx.fill();
                    // свет фар
                    ctx.beginPath();
                    ctx.arc(carX + 3, carY - 1, 3, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 200, 50, 0.4)';
                    ctx.fill();
                }

                // Отражения на мокром асфальте
                ctx.save();
                ctx.globalAlpha = 0.25;
                for (let i = 0; i < 20; i++) {
                    let x = (i * 120 + 30) % w;
                    ctx.beginPath();
                    ctx.ellipse(x, h * 0.9, 18, 4, 0, 0, Math.PI * 2);
                    ctx.fillStyle = '#f984ef';
                    ctx.fill();
                }
                ctx.restore();
            }

            function animateCanvas() {
                if (!canvasActive) return;
                time += 0.016;
                if (currentVisual === 'forest') drawForest(time);
                else if (currentVisual === 'ocean') drawOcean(time);
                else if (currentVisual === 'space') drawSpace(time);
                else if (currentVisual === 'rain') drawRain(time);
                else if (currentVisual === 'city') drawCity(time);
                animFrameId = requestAnimationFrame(animateCanvas);
            }
            function stopCanvasAnim() {
                if (animFrameId) cancelAnimationFrame(animFrameId);
                canvasActive = false;
            }
            function startCanvasAnim() {
                if (canvasActive) return;
                canvasActive = true;
                animateCanvas();
            }

            // ---------- АУДИО (без изменений) ----------
            function getAudioCtx() {
                if (!audioContext || audioContext.state === 'closed') {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') audioContext.resume();
                return audioContext;
            }
            function getMasterGain() {
                const ctx = getAudioCtx();
                if (!masterGain || masterGain.context !== ctx) {
                    masterGain = ctx.createGain();
                    masterGain.gain.value = isMuted ? 0 : volume;
                    masterGain.connect(ctx.destination);
                }
                return masterGain;
            }
            function updateMasterVolume() {
                if (masterGain) masterGain.gain.value = isMuted ? 0 : volume;
                if (customAudioElement && !customMediaSource && isCustomMode) {
                    customAudioElement.volume = isMuted ? 0 : volume;
                }
            }
            function stopAllSynth() {
                stopSoundFunctions.forEach(fn => { try { fn(); } catch (e) { } });
                stopSoundFunctions = [];
                activeSoundNodes.forEach(node => { try { node.disconnect(); if (node.stop) node.stop(); } catch (e) { } });
                activeSoundNodes = [];
            }

            function addDrone(ctx, master, freq, gainVal, panVal, lfoFreq = 0.05, depth = 5) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = lfoFreq;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = depth;
                lfo.connect(lfoGain);
                lfoGain.connect(osc.frequency);
                const gainNode = ctx.createGain();
                gainNode.gain.value = gainVal;
                const panner = ctx.createStereoPanner();
                panner.pan.value = panVal;
                osc.connect(gainNode);
                gainNode.connect(panner);
                panner.connect(master);
                osc.start();
                lfo.start();
                activeSoundNodes.push(osc, lfo, lfoGain, gainNode, panner);
                return () => { try { osc.stop(); lfo.stop(); } catch (e) { } };
            }
            function addSoftNoise(ctx, master, gainVal, lowpassFreq = 800, highpassFreq = 20) {
                const bufferSize = 4 * ctx.sampleRate;
                const noiseBuf = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = noiseBuf.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
                const src = ctx.createBufferSource();
                src.buffer = noiseBuf;
                src.loop = true;
                const lowpass = ctx.createBiquadFilter();
                lowpass.type = 'lowpass';
                lowpass.frequency.value = lowpassFreq;
                const highpass = ctx.createBiquadFilter();
                highpass.type = 'highpass';
                highpass.frequency.value = highpassFreq;
                const gain = ctx.createGain();
                gain.gain.value = gainVal;
                const panner = ctx.createStereoPanner();
                src.connect(highpass);
                highpass.connect(lowpass);
                lowpass.connect(gain);
                gain.connect(panner);
                panner.connect(master);
                src.start();
                activeSoundNodes.push(src, lowpass, highpass, gain, panner);
                return () => { try { src.stop(); } catch (e) { } };
            }
            function startForest() { stopAllSynth(); const ctx = getAudioCtx(), m = getMasterGain(); let s = []; s.push(addSoftNoise(ctx, m, 0.28, 1100, 80)); s.push(addDrone(ctx, m, 54, 0.12, -0.2, 0.03, 2.5)); s.push(addDrone(ctx, m, 72, 0.09, 0.1, 0.04, 2.8)); s.push(addDrone(ctx, m, 108, 0.07, 0.3, 0.06, 1.5)); stopSoundFunctions = s; }
            function startOcean() { stopAllSynth(); const ctx = getAudioCtx(), m = getMasterGain(); let s = []; s.push(addSoftNoise(ctx, m, 0.52, 550, 15)); s.push(addDrone(ctx, m, 42, 0.10, -0.4, 0.02, 1.8)); s.push(addDrone(ctx, m, 56, 0.08, 0.2, 0.025, 2.0)); s.push(addDrone(ctx, m, 84, 0.06, 0.5, 0.04, 1.2)); stopSoundFunctions = s; }
            function startSpace() { stopAllSynth(); const ctx = getAudioCtx(), m = getMasterGain(); let s = []; s.push(addSoftNoise(ctx, m, 0.22, 400, 90)); s.push(addDrone(ctx, m, 32, 0.09, -0.5, 0.018, 1.2)); s.push(addDrone(ctx, m, 48, 0.11, 0.1, 0.022, 1.9)); s.push(addDrone(ctx, m, 65, 0.08, 0.4, 0.027, 1.5)); s.push(addDrone(ctx, m, 80, 0.06, -0.2, 0.032, 1.0)); stopSoundFunctions = s; }
            function startRain() { stopAllSynth(); const ctx = getAudioCtx(), m = getMasterGain(); let s = []; s.push(addSoftNoise(ctx, m, 0.48, 1200, 200)); s.push(addDrone(ctx, m, 48, 0.07, -0.1, 0.035, 1.4)); s.push(addDrone(ctx, m, 72, 0.05, 0.2, 0.04, 1.0)); stopSoundFunctions = s; }
            function startCity() { stopAllSynth(); const ctx = getAudioCtx(), m = getMasterGain(); let s = []; s.push(addSoftNoise(ctx, m, 0.35, 500, 30)); s.push(addDrone(ctx, m, 62, 0.10, -0.3, 0.028, 2.2)); s.push(addDrone(ctx, m, 93, 0.08, 0.4, 0.035, 1.8)); s.push(addDrone(ctx, m, 124, 0.06, -0.1, 0.042, 1.3)); stopSoundFunctions = s; }

            function applyStandardTheme(themeId) {
                currentThemeId = themeId;
                const t = themes.find(x => x.id === themeId);
                currentVisual = t.visualType;
                nowPlayingDiv.innerHTML = `🎵 ${t.name} — ${t.description}`;
                if (isPlaying && !isCustomMode) {
                    if (themeId === 'forest') startForest();
                    else if (themeId === 'ocean') startOcean();
                    else if (themeId === 'space') startSpace();
                    else if (themeId === 'rain') startRain();
                    else if (themeId === 'city') startCity();
                }
                renderCards();
            }

            function activateCustomMode() {
                if (!customAudioUrl && !customAudioElement) {
                    nowPlayingDiv.innerHTML = '⚠️ Сначала загрузите музыку!';
                    return;
                }
                if (isCustomMode) return;
                if (isPlaying) pausePlayback();
                stopAllSynth();
                isCustomMode = true;
                currentThemeId = 'custom';
                stopCanvasAnim();
                canvas.style.opacity = '0';
                if (customBgImageUrl) {
                    userBgLayer.style.backgroundImage = `url(${customBgImageUrl})`;
                    userBgLayer.classList.add('active');
                } else {
                    userBgLayer.classList.remove('active');
                }
                if (!customAudioElement && customAudioUrl) {
                    customAudioElement = new Audio(customAudioUrl);
                    customAudioElement.loop = true;
                }
                if (customAudioElement) {
                    const ctx = getAudioCtx();
                    const master = getMasterGain();
                    if (customMediaSource) try { customMediaSource.disconnect(); } catch (e) { }
                    customMediaSource = ctx.createMediaElementSource(customAudioElement);
                    customMediaSource.connect(master);
                    customAudioElement.volume = 1;
                    updateMasterVolume();
                    if (isPlaying) customAudioElement.play().catch(e => console.warn);
                }
                customModeBadge.innerHTML = '🎧 персональный режим';
                nowPlayingDiv.innerHTML = `🎵 Моя музыка — ${musicPreview.innerText.slice(0, 30)} ${customBgImageUrl ? '🎨 + твой фон' : ''}`;
                renderCards();
            }

            function deactivateCustomMode() {
                if (!isCustomMode) return;
                isCustomMode = false;
                currentThemeId = themes[0].id;
                if (customAudioElement) {
                    customAudioElement.pause();
                    if (customMediaSource) customMediaSource.disconnect();
                    customMediaSource = null;
                }
                canvas.style.opacity = '1';
                userBgLayer.classList.remove('active');
                startCanvasAnim();
                const targetId = currentThemeId !== 'custom' ? currentThemeId : 'forest';
                currentThemeId = targetId;
                const t = themes.find(x => x.id === targetId);
                currentVisual = t.visualType;
                if (isPlaying) {
                    if (targetId === 'forest') startForest();
                    else if (targetId === 'ocean') startOcean();
                    else if (targetId === 'space') startSpace();
                    else if (targetId === 'rain') startRain();
                    else if (targetId === 'city') startCity();
                }
                customModeBadge.innerHTML = '🌙 стандартный режим';
                nowPlayingDiv.innerHTML = `✨ ${t.name} — ${t.description}`;
                renderCards();
            }

            function renderCards() {
                cardsGrid.innerHTML = '';
                themes.forEach(theme => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    if (!isCustomMode && currentThemeId === theme.id) card.classList.add('active');
                    card.dataset.themeId = theme.id;
                    card.innerHTML = `<span class="icon">${theme.icon}</span><span class="label">${theme.name}</span>`;
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (isCustomMode) deactivateCustomMode();
                        if (currentThemeId !== theme.id) {
                            currentThemeId = theme.id;
                            const t = themes.find(x => x.id === theme.id);
                            currentVisual = t.visualType;
                            nowPlayingDiv.innerHTML = `🎵 ${t.name} — ${t.description}`;
                            if (isPlaying) {
                                stopAllSynth();
                                if (theme.id === 'forest') startForest();
                                else if (theme.id === 'ocean') startOcean();
                                else if (theme.id === 'space') startSpace();
                                else if (theme.id === 'rain') startRain();
                                else if (theme.id === 'city') startCity();
                            }
                            renderCards();
                        } else {
                            if (!isPlaying) resumePlayback();
                        }
                    });
                    cardsGrid.appendChild(card);
                });

                if (customAudioUrl) {
                    const customCard = document.createElement('div');
                    customCard.className = 'card';
                    if (isCustomMode) customCard.classList.add('active');
                    customCard.setAttribute('data-custom', 'true');
                    customCard.innerHTML = `<span class="icon">🎧</span><span class="label">Моё</span>`;
                    customCard.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (!customAudioUrl) {
                            nowPlayingDiv.innerHTML = '⚠️ Загрузите музыку сначала!';
                            return;
                        }
                        if (isCustomMode) {
                            if (customAudioElement && isPlaying) {
                                customAudioElement.currentTime = 0;
                                customAudioElement.play().catch(e => console.warn);
                            }
                            return;
                        }
                        activateCustomMode();
                        if (!isPlaying) resumePlayback();
                    });
                    cardsGrid.appendChild(customCard);
                }
            }

            function loadMusic(file) {
                if (customAudioUrl) URL.revokeObjectURL(customAudioUrl);
                customAudioUrl = URL.createObjectURL(file);
                if (customAudioElement) {
                    customAudioElement.pause();
                    customAudioElement = null;
                }
                customAudioElement = new Audio(customAudioUrl);
                customAudioElement.loop = true;
                musicPreview.innerText = file.name;
                if (isCustomMode) deactivateCustomMode();
                renderCards();
                nowPlayingDiv.innerHTML = `🎵 Готово: ${file.name}. Нажми «Моё» чтобы включить.`;
            }
            function loadBg(file) {
                if (customBgImageUrl) URL.revokeObjectURL(customBgImageUrl);
                customBgImageUrl = URL.createObjectURL(file);
                bgPreview.innerText = file.name;
                if (isCustomMode) {
                    userBgLayer.style.backgroundImage = `url(${customBgImageUrl})`;
                    userBgLayer.classList.add('active');
                }
            }

            uploadMusic.addEventListener('change', e => { if (e.target.files.length) loadMusic(e.target.files[0]); });
            uploadBg.addEventListener('change', e => { if (e.target.files.length) loadBg(e.target.files[0]); });
            resetCustomBtn.addEventListener('click', () => {
                if (isCustomMode) deactivateCustomMode();
                if (customAudioUrl) { URL.revokeObjectURL(customAudioUrl); customAudioUrl = null; }
                if (customBgImageUrl) { URL.revokeObjectURL(customBgImageUrl); customBgImageUrl = null; }
                customAudioElement = null;
                customMediaSource = null;
                musicPreview.innerText = 'Файл не выбран';
                bgPreview.innerText = 'Фон не выбран';
                userBgLayer.classList.remove('active');
                isCustomMode = false;
                currentThemeId = 'forest';
                applyStandardTheme('forest');
                renderCards();
                if (isPlaying) { stopAllSynth(); startForest(); }
            });

            function resumePlayback() {
                if (isPlaying) return;
                getAudioCtx().resume();
                isPlaying = true;
                playIcon.textContent = '⏸';
                playLabel.textContent = 'Пауза';
                if (isCustomMode && customAudioElement) {
                    customAudioElement.play().catch(e => console.log);
                } else if (!isCustomMode) {
                    const tid = currentThemeId === 'custom' ? 'forest' : currentThemeId;
                    if (tid === 'forest') startForest();
                    else if (tid === 'ocean') startOcean();
                    else if (tid === 'space') startSpace();
                    else if (tid === 'rain') startRain();
                    else if (tid === 'city') startCity();
                }
            }
            function pausePlayback() {
                if (!isPlaying) return;
                isPlaying = false;
                playIcon.textContent = '▶';
                playLabel.textContent = 'Играть';
                if (isCustomMode && customAudioElement) customAudioElement.pause();
                else stopAllSynth();
            }
            function togglePlayPause() { isPlaying ? pausePlayback() : resumePlayback(); }
            function toggleMute() { isMuted = !isMuted; muteBtn.textContent = isMuted ? '🔇' : '🔊'; updateMasterVolume(); }

            function init() {
                volumeSlider.value = volume * 100;
                volumeSlider.addEventListener('input', e => { volume = e.target.value / 100; updateMasterVolume(); });
                playPauseBtn.addEventListener('click', togglePlayPause);
                muteBtn.addEventListener('click', toggleMute);
                startCanvasAnim();
                applyStandardTheme('forest');
                renderCards();
                window.addEventListener('beforeunload', () => {
                    if (customAudioUrl) URL.revokeObjectURL(customAudioUrl);
                    if (customBgImageUrl) URL.revokeObjectURL(customBgImageUrl);
                    if (audioContext) audioContext.close();
                });
            }
            init();
        })();
    </script>
</body>
